<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate | Stacy R. Hall – Organic Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#f5f2eb;--charcoal:#2d2d2d;--terracotta:#d4785c;--sage:#7a9e7e;--navy:#233a4d;--sand:#e8e3d9;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--charcoal);line-height:1.6;}
header{padding:2rem;text-align:center;}
header h1{font-family:'Instrument Serif',serif;font-size:clamp(2.5rem,8vw,5rem);color:var(--navy);}
nav{display:flex;justify-content:center;gap:2rem;padding:1rem;background:rgba(255,255,255,0.9);border-bottom:1px solid var(--sand);} 
nav a{color:var(--charcoal);text-decoration:none;font-weight:500;}
nav a.active,nav a:hover{color:var(--terracotta);} 
main{max-width:600px;margin:2rem auto;padding:1rem;}
form{background:#fff;border:1px solid var(--sand);padding:2rem;}
label{display:block;margin-top:1rem;font-weight:500;}
input,select,textarea{width:100%;padding:0.5rem;margin-top:0.25rem;border:1px solid var(--sand);}
button{margin-top:1.5rem;padding:0.75rem 1.5rem;background:var(--terracotta);color:#fff;border:none;cursor:pointer;}
button:hover{background:var(--navy);}
footer{border-top:1px solid var(--sand);padding:1rem;text-align:center;margin-top:3rem;}
footer a{margin:0 .5rem;color:var(--charcoal);text-decoration:none;}
footer a:hover{color:var(--terracotta);} 
</style>
</head>
<body>
<header><h1>Stacy R. Hall</h1></header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="priorities.html">Priorities</a>
<a href="experience.html">Experience</a>
<a href="get-involved.html">Get Involved</a>
<a href="donate.html" class="active" style="color:var(--terracotta);font-weight:600;">Donate</a>
</nav>
<main>
<h2>Donate to the Campaign</h2>
<form action="#" method="POST">
<label for="amount">Amount</label>
<select id="amount" name="amount">
<option>$25</option>
<option>$50</option>
<option>$100</option>
<option>Custom</option>
</select>
<label for="name">Name (optional)</label>
<input type="text" id="name" name="name" placeholder="Your Name"/>
<label for="email">Email (optional)</label>
<input type="email" id="email" name="email" placeholder="you@example.com"/>
<button type="submit">Donate Now</button>
</form>
</main>
<footer>
<a href="https://www.facebook.com/stacy.j.hall.1">Facebook</a>
<a href="https://www.instagram.com/shall279">Instagram</a>
<a href="https://www.linkedin.com/in/stacyrhall">LinkedIn</a>
<p>&copy; 2026 Stacy R. Hall for City Council • Paid for by Stacy Hall Campaign</p>
</footer>
</body>
</html>
