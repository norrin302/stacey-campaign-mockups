<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate | Stacy R. Hall – Brutalist Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--fg:#fff;--muted:#888;--accent:#ff5c39;--card:#141414;--border:#2a2a2a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;line-height:1.6;}
.grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(255,92,57,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,92,57,0.03)1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:-1;}
nav{position:fixed;top:0;left:0;right:0;padding:1.5rem 4rem;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;transition:color .3s;}
.nav-links a:hover,.nav-links a.active{color:var(--fg);}
section{max-width:600px;margin:8rem auto 2rem;padding:1rem;}
form{background:var(--card);border:1px solid var(--border);padding:2rem;}
label{display:block;margin-top:1rem;font-weight:500;}
input,select,textarea{width:100%;padding:0.5rem;margin-top:0.25rem;border:1px solid var(--border);}
button{margin-top:1.5rem;padding:0.75rem 1.5rem;background:var(--accent);color:#fff;border:none;cursor:pointer;}
button:hover{background:var(--fg);color:var(--bg);}
footer{border-top:1px solid var(--border);padding:1rem;text-align:center;margin-top:3rem;}
footer a{color:var(--muted);margin:0 .5rem;text-decoration:none;}
footer a:hover{color:var(--accent);} 
</style>
</head>
<body>
<div class="grid-bg"></div>
<nav>
<div class="logo">Stacy<span>Hall</span></div>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="priorities.html">Priorities</a></li>
<li><a href="experience.html">Experience</a></li>
<li><a href="get-involved.html">Get Involved</a></li>
<li><a href="donate.html" class="active" class="nav-cta">Donate</a></li>
</ul>
</nav>
<section>
<h2>Donate to the Campaign</h2>
<form action="#" method="POST">
<label for="amount">Amount</label>
<select id="amount" name="amount">
<option>$25</option>
<option>$50</option>
<option>$100</option>
<option>Custom</option>
</select>
<label for="name">Name (optional)</label>
<input type="text" id="name" name="name" placeholder="Your Name"/>
<label for="email">Email (optional)</label>
<input type="email" id="email" name="email" placeholder="you@example.com"/>
<button type="submit">Donate Now</button>
</form>
</section>
<footer>
<a href="https://www.facebook.com/stacy.j.hall.1">Facebook</a>
<a href="https://www.instagram.com/shall279">Instagram</a>
<a href="https://www.linkedin.com/in/stacyrhall">LinkedIn</a>
<p>&copy; 2026 Stacy R. Hall for City Council • Paid for by Stacy Hall Campaign</p>
</footer>
</body>
</html>
