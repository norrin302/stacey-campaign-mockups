<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate | Stacy R. Hall for City Council</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #faf8f5;
            --accent: #c45c26;
            --muted: #6b6b6b;
            --rule: #e0dcd5;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Libre Franklin',sans-serif; background:var(--paper); color:var(--ink); line-height:1.6; }
        .masthead { border-bottom:3px solid var(--ink); padding:2rem 0 1rem; text-align:center; }
        .masthead h1 {font-family:'DM Serif Display',serif; font-size:clamp(2.5rem,8vw,5rem); font-weight:400;}
        .nav-rule {border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:0.75rem 0; margin:1.5rem 0;}
        .nav-rule ul {display:flex; justify-content:center; gap:2rem; list-style:none; flex-wrap:wrap;}
        .nav-rule a {text-decoration:none; color:var(--ink); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.15em; font-weight:500;}
        .nav-rule a:hover, .nav-rule a.active {color:var(--accent);}
        .edition {max-width:1000px; margin:0 auto; padding:2rem;}
        .page-title {text-align:center; margin-bottom:3rem;}
        .page-title h2 {font-family:'DM Serif Display',serif; font-size:3rem;}
        .donate-form {background:#fff; border:1px solid var(--rule); padding:2rem; max-width:600px; margin:0 auto;}
        .donate-form label {display:block; margin-top:1rem; font-weight:500;}
        .donate-form input, .donate-form select, .donate-form textarea {width:100%; padding:0.5rem; margin-top:0.25rem; border:1px solid var(--rule);}
        .donate-form button {margin-top:1.5rem; padding:0.75rem 1.5rem; background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer;}
        .donate-form button:hover {background:var(--ink);}
        .colophon {border-top:3px solid var(--ink); padding:2rem 0; text-align:center; margin-top:3rem;}
        .social-links a {color:var(--ink); margin:0 0.5rem; text-decoration:none; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.1em;}
        .social-links a:hover {color:var(--accent);} 
        .colophon p {font-size:0.8rem; color:var(--muted); margin-top:1rem;}
    </style>
</head>
<body>
    <header class="masthead"><h1>Stacy R. Hall</h1></header>
    <nav class="nav-rule">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="priorities.html">Priorities</a></li>
            <li><a href="experience.html">Experience</a></li>
            <li><a href="get-involved.html">Get Involved</a></li>
            <li><a href="donate.html" class="active" style="color: var(--accent); font-weight:600;">Donate</a></li>
        </ul>
    </nav>
    <main class="edition">
        <header class="page-title"><h2>Support the Campaign</h2></header>
        <form class="donate-form" action="#" method="POST">
            <label for="amount">Donation Amount</label>
            <select id="amount" name="amount">
                <option>$25</option>
                <option>$50</option>
                <option>$100</option>
                <option>Custom</option>
            </select>
            <label for="name">Your Name (optional)</label>
            <input type="text" id="name" name="name" placeholder="John Doe" />
            <label for="email">Email (optional)</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" />
            <button type="submit">Donate Now</button>
        </form>
    </main>
    <footer class="colophon">
        <div class="social-links">
            <a href="https://www.facebook.com/stacy.j.hall.1">Facebook</a>
            <a href="https://www.instagram.com/shall279">Instagram</a>
            <a href="https://www.linkedin.com/in/stacyrhall">LinkedIn</a>
        </div>
        <p>&copy; 2026 Stacy R. Hall for City Council • Paid for by Stacy Hall Campaign</p>
    </footer>
</body>
</html>
